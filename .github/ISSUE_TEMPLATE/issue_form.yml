name: 提交 Issue
description: 反馈问题、建议功能或报告平台爬取异常
labels: ["triage"]
body:
  - type: input
    id: version
    attributes:
      label: 版本号
      description: 你使用的程序版本（git commit hash、tag 或下载来源）
      placeholder: 例如 de6f076、v1.2.0、main 分支最新
    validations:
      required: true

  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前确认
      options:
        - label: 已阅读 [README](https://github.com/helloworld856/social-platform-scraper/blob/main/README.md) 中的「常见问题」部分
          required: true
        - label: 搜索过已有 issue，确认不是重复问题
          required: true
        - label: 没有敏感信息（API Key、密码等）出现在描述中
          required: true

  - type: textarea
    id: summary
    attributes:
      label: 一句话概括
      description: 用一两句话描述你遇到的问题或建议
      placeholder: |
        例如：「YouTube 关键词搜索在输入 50 个关键词后程序闪退」
        例如：「希望 TikTok 评论采集支持导出图片链接」
    validations:
      required: true

  - type: input
    id: tool-id
    attributes:
      label: 涉及工具
      description: 哪个工具？例如 `youtube_keyword_mining`、`tiktok_profile_videos`。功能建议可不填。
      placeholder: youtube_keyword_mining

  - type: textarea
    id: environment
    attributes:
      label: 运行环境（问题反馈必填）
      description: 操作系统、Python 版本、浏览器版本、运行方式
      value: |
        - 操作系统：
        - Python 版本：
        - 浏览器及版本：
        - 运行方式（python main.py / 命令行 / IDE）：



  - type: markdown
    attributes:
      value: |
        ## 🐛 问题反馈 — 以下区域

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 按顺序列出能稳定复现该问题的操作步骤
      placeholder: |
        1. 打开程序，选择 '...' 工具
        2. 输入参数 '...'，填写链接/关键词 '...'
        3. 点击「开始」
        4. 看到错误 '...'

  - type: textarea
    id: input-content
    attributes:
      label: 输入内容
      description: 出问题时的输入（链接、关键词等），敏感信息请脱敏
      placeholder: |
        ```
        https://www.tiktok.com/@example
        https://www.youtube.com/watch?v=xxxx
        ```
      render: text

  - type: markdown
    attributes:
      value: |
        ## ✨ 功能建议 — 以下区域

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 在什么场景下需要这个功能？它要解决什么问题？
      placeholder: 例如：「我需要批量导出 TikTok 评论中的图片链接，因为目前只能导出文字……」
      render: text

  - type: textarea
    id: proposal
    attributes:
      label: 期望行为
      description: 你希望这个功能如何工作？
      placeholder: 例如：「在参数配置中增加勾选项「导出评论图片链接」，勾选后输出的评论列追加图片 URL……」
      render: text

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否考虑过其他替代方案或临时绕过方法？

  - type: markdown
    attributes:
      value: |
        ## 🌐 平台爬取问题 — 以下区域

  - type: dropdown
    id: platform
    attributes:
      label: 涉及平台
      options:
        - YouTube
        - TikTok
        - X/Twitter
        - Instagram
        - 数据处理（AIGC / XLSX 合并）
        - 通用 / 不涉及平台

  - type: textarea
    id: urls
    attributes:
      label: 目标链接
      description: 采集时使用的目标链接，脱敏后粘贴
      placeholder: |
        ```
        https://www.tiktok.com/@example/video/123456
        https://x.com/user/status/789012
        ```
      render: text

  - type: dropdown
    id: login-status
    attributes:
      label: 浏览器登录状态
      description: 运行时浏览器是否已登录该平台？
      options:
        - 已登录，可以正常浏览
        - 未登录
        - 不确定

  - type: dropdown
    id: account-type
    attributes:
      label: 目标账号/内容类型
      options:
        - 公开账号 / 公开内容
        - 私密账号 / 受限内容
        - 不确定

  - type: textarea
    id: crawler-config
    attributes:
      label: 参数配置
      description: 出问题时「参数配置」中有修改过默认值的参数请说明
      placeholder: |
        - 页面加载超时：30s（默认）
        - 最大滚动次数：200（默认）
        - 其他修改过的参数：...

  - type: markdown
    attributes:
      value: |
        ## 📎 日志与截图

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 报错信息
      description: |
        程序日志框中的错误信息或终端报错。
        **如果日志很长，只粘贴报错前后相关的部分（前后各 20 行左右）。**
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果文字无法描述清楚，可以把截图拖到这里

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他任何有助于排查的信息（如是否使用代理、网络环境、特殊操作等）
